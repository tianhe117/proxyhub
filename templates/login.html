<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProxyHub — Login</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            background: #fafafa;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 30px;
            width: 300px;
        }
        .login-card h1 {
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
        }
        .login-card input {
            font-family: inherit;
            font-size: 13px;
            width: 100%;
            height: 28px;
            padding: 0 8px;
            margin-bottom: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background: #fafafa;
        }
        .login-card input:focus { outline: none; border-color: #999; }
        .login-card button {
            font-family: inherit;
            font-size: 13px;
            width: 100%;
            height: 28px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 4px;
        }
        .login-card button:hover { background: #555; }
        .error {
            color: #e53935;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>ProxyHub</h1>
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password">
            <button type="submit">Login</button>
        </form>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
